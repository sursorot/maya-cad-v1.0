<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometry OS</title>
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    
    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/main.tsx" />
    
    <!-- DNS prefetch for any external APIs -->
    <link rel="dns-prefetch" href="https://api.openai.com" />
    
    <!-- Critical CSS for Geometry OS loading page (inlined for fast first paint) -->
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'IBM Plex Mono', -apple-system, BlinkMacSystemFont, monospace;
        background: #ffffff;
        overflow: hidden;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
      }
      
      /* Geometry OS Loading Page */
      .loading-page {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      
      .loading-icon {
        width: 48px;
        height: 48px;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #e0e0e0;
        border-top-color: #000000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-title {
        font-size: 14px;
        font-weight: 600;
        color: #000000;
        letter-spacing: -0.02em;
      }
      
      .loading-subtitle {
        font-size: 10px;
        color: #6c6c6c;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Geometry OS Loading Page - replaced by React when app loads -->
      <div class="loading-page" aria-label="Loading Geometry OS...">
        <div class="loading-content">
          <!-- Icon -->
          <div class="loading-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="1"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="9" y1="9" x2="9" y2="21"/>
            </svg>
          </div>
          <!-- Spinner -->
          <div class="loading-spinner"></div>
          <!-- Title -->
          <span class="loading-title">Geometry OS</span>
          <!-- Subtitle -->
          <span class="loading-subtitle">Loading</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register service worker for offline caching (if available) -->
    <script>
      if ('serviceWorker' in navigator && import.meta.env?.PROD) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
