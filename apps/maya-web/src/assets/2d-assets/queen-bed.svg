<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="-302 -402 604 804" height="100%" width="100%">
  <defs>
    <pattern patternUnits="userSpaceOnUse" height="1000" width="1000" viewBox="0,0,10,10" id="placeholder">
      <polygon points="0,0 0,5 5,5 5,0" fill="grey"/>
      <polygon points="5,5 5,10 10,10 10,5" fill="grey"/>
    </pattern>
  </defs>
  
  <!-- Bed frame outer - Queen: 60" x 80" scaled to ~300 x 400 units -->
  <rect x="-300" y="-400" width="600" height="800" rx="8" ry="8" fill="rgba(0,0,0,0.04)" stroke-width="3.0" stroke="rgba(0,0,0,1.00)"/>
  
  <!-- Headboard (thick top section) -->
  <rect x="-300" y="-400" width="600" height="60" rx="8" ry="8" fill="rgba(0,0,0,0.06)" stroke-width="3.0" stroke="rgba(0,0,0,1.00)"/>
  <line x1="-300" y1="-340" x2="300" y2="-340" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  
  <!-- Mattress outline -->
  <rect x="-280" y="-320" width="560" height="680" rx="6" ry="6" fill="rgba(255,255,255,0.5)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  
  <!-- Left pillow -->
  <rect x="-260" y="-300" width="130" height="90" rx="18" ry="18" fill="rgba(255,255,255,0.8)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  <!-- Left pillow inner detail -->
  <rect x="-242" y="-282" width="94" height="54" rx="10" ry="10" fill="none" stroke-width="1.5" stroke="rgba(188,188,188,1.00)"/>
  
  <!-- Right pillow -->
  <rect x="130" y="-300" width="130" height="90" rx="18" ry="18" fill="rgba(255,255,255,0.8)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  <!-- Right pillow inner detail -->
  <rect x="148" y="-282" width="94" height="54" rx="10" ry="10" fill="none" stroke-width="1.5" stroke="rgba(188,188,188,1.00)"/>
  
  <!-- Blanket/comforter fold line -->
  <path d="M -280 -160 Q 0 -120 280 -160" fill="none" stroke-width="1.5" stroke="rgba(188,188,188,1.00)"/>
  
  <!-- Footboard indication -->
  <line x1="-280" y1="360" x2="280" y2="360" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  
  <!-- Bed legs (corner indicators) -->
  <circle cx="-285" cy="-385" r="12" fill="rgba(0,0,0,0.06)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  <circle cx="285" cy="-385" r="12" fill="rgba(0,0,0,0.06)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  <circle cx="-285" cy="385" r="12" fill="rgba(0,0,0,0.06)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
  <circle cx="285" cy="385" r="12" fill="rgba(0,0,0,0.06)" stroke-width="2.0" stroke="rgba(0,0,0,1.00)"/>
</svg>

